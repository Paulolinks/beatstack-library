appId: com.beatstack.library
productName: BeatStack Library
copyright: Copyright © BeatStack
artifactName: ${productName}-Setup-${version}.${ext}
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
directories:
  output: dist-electron
files:
  - desktop/**/*
  - "!desktop/**/*.map"
  - package.json
  - "!node_modules/**/*"
extraResources:
  - from: desktop/default-server.json
    to: default-server.json
win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: BeatStack
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: BeatStack Library
  uninstallDisplayName: BeatStack Library
  installerLanguages:
    - pt_BR
    - en_US
